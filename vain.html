<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f3e8ce">
<title>The Vain Man · Le Petit Prince</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,700&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --paper: #f3e8ce;
  --paper-2: #ead9b2;
  --ink: #2a1f17;
  --ink-soft: #6a5641;
  --ink-faint: #a89578;
  --char-light: #f0d488;
  --char-mid: #c89028;
  --char-deep: #7a5a18;
  --gold: #d4a017;
}
html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Fraunces', Georgia, serif;
  min-height: 100vh;
  overflow-x: hidden;
  user-select: none;
  -webkit-user-select: none;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    radial-gradient(ellipse at 20% 15%, color-mix(in srgb, var(--char-mid) 12%, transparent), transparent 50%),
    radial-gradient(ellipse at 80% 85%, rgba(212, 160, 23, 0.06), transparent 50%),
    url("data:image/svg+xml,%3Csvg viewBox='0 0 240 240' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/%3E%3CfeColorMatrix values='0 0 0 0 0.16 0 0 0 0 0.12 0 0 0 0 0.09 0 0 0 0.06 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  mix-blend-mode: multiply;
}
.page {
  position: relative; z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  padding: 40px 28px 60px;
  min-height: 100vh;
  display: flex; flex-direction: column;
}
.eyebrow {
  font-family: 'Caveat', cursive;
  font-size: 18px;
  color: var(--char-deep);
  letter-spacing: 1px;
  display: flex; align-items: center; justify-content: center;
  gap: 12px; margin-bottom: 24px;
}
.eyebrow::before, .eyebrow::after {
  content: ''; flex: 1; max-width: 60px;
  height: 1px; background: var(--char-deep); opacity: 0.4;
}
.title-block { text-align: center; margin-bottom: 32px; }
.en-name {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 900;
  font-size: 52px;
  color: var(--char-deep);
  letter-spacing: -0.02em;
  line-height: 1;
  margin-bottom: 8px;
}
.fr-name {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 22px;
  color: var(--ink-soft);
  letter-spacing: 0.04em;
  margin-bottom: 14px;
}
.asteroid-num {
  display: inline-block;
  padding: 5px 14px;
  font-family: 'Fraunces', serif;
  font-size: 11px;
  letter-spacing: 0.3em;
  color: var(--char-deep);
  border: 1px solid var(--char-deep);
  border-radius: 999px;
  text-transform: uppercase;
}
.illustration {
  width: 220px; height: 220px;
  margin: 0 auto 32px;
}
.illustration svg { width: 100%; height: 100%; display: block; }
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
.char-figure { animation: float 5s ease-in-out infinite; transform-origin: center bottom; }
@keyframes twinkle {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}
.twinkle { animation: twinkle 3s ease-in-out infinite; }
.twinkle.d1 { animation-delay: 0.6s; }
.twinkle.d2 { animation-delay: 1.4s; }
.twinkle.d3 { animation-delay: 2.1s; }
.quote {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-size: 21px;
  line-height: 1.55;
  color: var(--ink);
  text-align: center;
  padding: 28px 24px;
  margin-bottom: 28px;
  position: relative;
  background: rgba(255, 252, 244, 0.6);
  border: 1px solid color-mix(in srgb, var(--char-mid) 25%, transparent);
  border-radius: 6px;
  font-style: italic;
}
.quote::before, .quote::after {
  content: '"';
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 48px;
  color: var(--char-mid);
  line-height: 1;
  position: absolute;
}
.quote::before { top: 4px; left: 12px; }
.quote::after { bottom: -16px; right: 12px; }
.quote em {
  font-weight: 700;
  color: var(--char-deep);
  font-style: italic;
}
.player {
  background: var(--ink);
  color: var(--paper);
  border-radius: 14px;
  padding: 22px 24px;
  margin-bottom: 28px;
  position: relative;
  box-shadow: 0 8px 24px rgba(42, 31, 23, 0.18);
}
.player::before {
  content: 'AUDIO';
  position: absolute; top: -10px; left: 22px;
  font-family: 'Fraunces', serif;
  font-size: 10px; letter-spacing: 0.3em;
  color: var(--paper);
  background: var(--char-mid);
  padding: 4px 12px; border-radius: 4px;
  font-weight: 700;
}
.player-controls { display: flex; align-items: center; gap: 16px; }
.play-btn {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: var(--char-mid);
  border: none; color: var(--paper); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s, background 0.2s;
  flex-shrink: 0; position: relative;
}
.play-btn:active { transform: scale(0.92); }
.play-btn svg { width: 24px; height: 24px; }
.play-btn .icon-play { display: block; margin-left: 3px; }
.play-btn .icon-pause { display: none; }
.player.playing .play-btn .icon-play { display: none; }
.player.playing .play-btn .icon-pause { display: block; }
.play-btn::after {
  content: ''; position: absolute; inset: -6px;
  border: 2px solid var(--char-mid); border-radius: 50%; opacity: 0;
}
.player.playing .play-btn::after { animation: ring 2s ease-out infinite; }
@keyframes ring {
  0% { opacity: 0.6; transform: scale(0.95); }
  100% { opacity: 0; transform: scale(1.4); }
}
.progress-area { flex: 1; display: flex; flex-direction: column; gap: 6px; }
.progress-bar {
  width: 100%; height: 4px;
  background: rgba(243, 232, 206, 0.2);
  border-radius: 2px; overflow: hidden;
  cursor: pointer; position: relative;
}
.progress-fill {
  height: 100%; width: 0%;
  background: var(--char-mid);
  border-radius: 2px;
  transition: width 0.1s linear;
}
.progress-time {
  display: flex; justify-content: space-between;
  font-family: 'Fraunces', serif;
  font-size: 11px; letter-spacing: 0.1em;
  color: rgba(243, 232, 206, 0.7);
}
.tap-hint {
  text-align: center;
  font-family: 'Caveat', cursive;
  font-size: 18px;
  color: var(--char-mid);
  margin: -16px 0 24px;
  opacity: 1;
  transition: opacity 0.5s;
}
.player.playing ~ .tap-hint,
.player.played ~ .tap-hint { opacity: 0; height: 0; margin: 0; }
.keywords {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; margin-bottom: 32px;
}
.kw {
  padding: 12px 6px;
  background: color-mix(in srgb, var(--char-mid) 8%, transparent);
  border: 1px solid color-mix(in srgb, var(--char-mid) 25%, transparent);
  border-radius: 4px;
  text-align: center;
  font-size: 14px;
  color: var(--char-deep);
  font-weight: 700;
  font-family: 'Fraunces', serif;
}
.kw .ts {
  display: block;
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
  margin-top: 3px;
  text-transform: uppercase;
}
.footer {
  margin-top: auto;
  padding-top: 28px;
  text-align: center;
  border-top: 1px dashed rgba(42, 31, 23, 0.2);
}
.footer .signature {
  font-family: 'Caveat', cursive;
  font-size: 17px;
  color: var(--ink-soft);
  margin-bottom: 6px;
  line-height: 1.4;
}
.footer .credit {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 11px;
  color: var(--ink-faint);
  letter-spacing: 0.15em;
}
.footer .nav {
  margin-top: 14px;
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 14px;
}
.footer .nav a {
  color: var(--char-deep);
  text-decoration: none;
  font-weight: 700;
  border-bottom: 1px dotted var(--char-deep);
  padding-bottom: 1px;
}
</style>
</head>
<body>
<main class="page">
  <div class="eyebrow">Asteroid · 326</div>
  <div class="title-block">
    <div class="en-name">The Vain Man</div>
    <div class="fr-name">Le Vaniteux</div>
    <div class="asteroid-num">Asteroid · 326</div>
  </div>
  <div class="illustration">
    <svg viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="planetGrad" cx="35%" cy="35%">
          <stop offset="0%" stop-color="#f0d488"/>
          <stop offset="60%" stop-color="#c89028"/>
          <stop offset="100%" stop-color="#7a5a18"/>
        </radialGradient>
        <radialGradient id="haloGrad" cx="50%" cy="50%">
          <stop offset="0%" stop-color="#c89028" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#c89028" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <g fill="#d4a017">
        <circle class="twinkle" cx="30" cy="30" r="1.6"/>
        <circle class="twinkle d1" cx="190" cy="40" r="1.4"/>
        <circle class="twinkle d2" cx="200" cy="100" r="1.8"/>
        <circle class="twinkle d3" cx="20" cy="120" r="1.4"/>
      </g>
      <g stroke="#d4a017" stroke-width="0.9" fill="none" stroke-linecap="round" opacity="0.7">
        <g class="twinkle d1" transform="translate(178,160)">
          <line x1="-5" y1="0" x2="5" y2="0"/><line x1="0" y1="-5" x2="0" y2="5"/>
        </g>
        <g class="twinkle d3" transform="translate(38,180)">
          <line x1="-4" y1="0" x2="4" y2="0"/><line x1="0" y1="-4" x2="0" y2="4"/>
        </g>
      </g>
      <circle cx="110" cy="150" r="80" fill="url(#haloGrad)"/>
      <ellipse cx="110" cy="158" rx="68" ry="14" fill="none" stroke="#c89028" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.5"/>
      <circle cx="110" cy="158" r="56" fill="url(#planetGrad)"/>
      <ellipse cx="86" cy="142" rx="9" ry="3" fill="#7a5a18" opacity="0.5"/>
      <ellipse cx="132" cy="172" rx="7" ry="2.5" fill="#7a5a18" opacity="0.4"/>
      <g class="char-figure" transform="translate(110, 100)">
        
        <ellipse cx="0" cy="-18" rx="34" ry="6" fill="#e8c068" stroke="#7a5a18" stroke-width="0.8"/>
        <path d="M -10 -22 Q -16 -36 -10 -42 Q -4 -36 -8 -22 Z" fill="#fff8e8" stroke="#7a5a18" stroke-width="0.5"/>
        <path d="M -4 -22 Q -10 -38 -2 -44 Q 4 -38 -2 -22 Z" fill="#f0d488" stroke="#7a5a18" stroke-width="0.5"/>
        <path d="M 4 -22 Q -2 -36 6 -42 Q 12 -36 6 -22 Z" fill="#fff8e8" stroke="#7a5a18" stroke-width="0.5"/>
        <ellipse cx="0" cy="-12" rx="14" ry="6" fill="#9c7406"/>
        <circle cx="0" cy="-2" r="9" fill="#f5d4a8" stroke="#a89578" stroke-width="0.5"/>
        <circle cx="-3" cy="-2" r="1" fill="#2a1f17"/>
        <circle cx="3" cy="-2" r="1" fill="#2a1f17"/>
        <path d="M -2 5 Q 0 7 2 5 Q 0 3 -2 5" fill="#c85a6f"/>
        <path d="M -3 -3 Q -2 -5 0 -4" stroke="#2a1f17" stroke-width="0.5" fill="none"/>
        <path d="M -14 4 L -16 6 L -14 8 L -10 6 L 10 6 L 14 8 L 16 6 L 14 4 Z" fill="#c89028" stroke="#7a5a18" stroke-width="0.5"/>
        <path d="M -14 8 L -12 32 L 12 32 L 14 8 Z" fill="#c89028"/>
        <line x1="-8" y1="12" x2="-8" y2="30" stroke="#7a5a18" stroke-width="0.5"/>
        <line x1="0" y1="12" x2="0" y2="30" stroke="#7a5a18" stroke-width="0.5"/>
        <line x1="8" y1="12" x2="8" y2="30" stroke="#7a5a18" stroke-width="0.5"/>
        <path d="M -16 6 L -26 -2 L -22 4 Z" fill="#f0d488"/>
        <path d="M -22 4 L -28 -8 M -22 4 L -28 -2" stroke="#7a5a18" stroke-width="0.6" fill="none"/>
        
      </g>
    </svg>
  </div>
  <blockquote class="quote">
    Admire me!<br>
    <em>I am the most handsome.</em>
  </blockquote>
  <div class="player" id="player">
    <div class="player-controls">
      <button class="play-btn" id="playBtn" aria-label="Play audio">
        <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 4h4v16H6zM14 4h4v16h-4z"/>
        </svg>
      </button>
      <div class="progress-area">
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-time">
          <span id="currentTime">0:00</span>
          <span id="duration">0:00</span>
        </div>
      </div>
    </div>
  </div>
  <div class="tap-hint">↑ tap to listen</div>
  <div class="keywords">
    <div class="kw">Pride<span class="ts">Orgueil</span></div>
    <div class="kw">Applause<span class="ts">Applaudissement</span></div>
    <div class="kw">Mirror<span class="ts">Miroir</span></div>
  </div>
  <footer class="footer">
    <div class="signature">"To the vain, all other men are admirers."</div>
    <div class="credit">— LE PETIT PRINCE · CHAPITRE XI</div>
    <div class="nav">
      <a href="index.html">← back to all eleven</a>
    </div>
  </footer>
</main>
<audio id="audio" preload="metadata" src="vain.mp3"></audio>
<script>
  const audio = document.getElementById('audio');
  const playBtn = document.getElementById('playBtn');
  const player = document.getElementById('player');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const currentTimeEl = document.getElementById('currentTime');
  const durationEl = document.getElementById('duration');
  function fmt(s) {
    if (!isFinite(s) || s < 0) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60).toString().padStart(2, '0');
    return m + ':' + sec;
  }
  audio.addEventListener('loadedmetadata', () => {
    durationEl.textContent = fmt(audio.duration);
  });
  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = pct + '%';
    currentTimeEl.textContent = fmt(audio.currentTime);
  });
  audio.addEventListener('ended', () => {
    player.classList.remove('playing');
    player.classList.add('played');
    progressFill.style.width = '0%';
    audio.currentTime = 0;
    currentTimeEl.textContent = '0:00';
  });
  playBtn.addEventListener('click', () => {
    if (audio.paused) {
      audio.play().then(() => player.classList.add('playing')).catch(()=>{});
    } else {
      audio.pause();
      player.classList.remove('playing');
    }
  });
  progressBar.addEventListener('click', (e) => {
    if (!audio.duration) return;
    const rect = progressBar.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
  });
  window.addEventListener('load', () => {
    audio.play().then(() => player.classList.add('playing')).catch(() => {});
  });
</script>
</body>
</html>
